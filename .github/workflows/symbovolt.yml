name: SYMBOVOLT v3.0 — Full Web Intelligence

on:
  workflow_dispatch:
    inputs:
      candidates:
        description: 'Candidați separați prin virgulă'
        required: true
        default: 'Magyar,Orban'
      wiki_pages:
        description: 'Pagini Wikipedia en | separate'
        required: true
        default: 'Péter_Magyar|Viktor_Orbán'
      wiki_pages_hu:
        description: 'Pagini Wikipedia hu | separate'
        required: true
        default: 'Magyar_Péter_(politikus)|Orbán_Viktor'
      trends_keywords:
        description: 'Google Trends keywords | separate'
        required: true
        default: 'Peter Magyar|Viktor Orban'
      reddit_queries:
        description: 'Reddit queries | separate'
        required: true
        default: 'Magyar Hungary|Orban Hungary'
      rss_feeds:
        description: 'RSS feeds | separate'
        required: true
        default: 'https://telex.hu/rss|https://444.hu/feed|https://index.hu/24ora/rss/'
      news_rss_en:
        description: 'RSS feeds engleza | separate'
        required: true
        default: 'https://feeds.bbci.co.uk/news/world/europe/rss.xml|https://rss.politico.eu/eu-confidential.xml'
      eurostat_country:
        description: 'Cod tara Eurostat'
        required: true
        default: 'HU'
      start_date:
        description: 'Start date YYYY-MM-DD'
        required: true
        default: '2024-01-01'
      end_date:
        description: 'End date YYYY-MM-DD'
        required: true
        default: '2026-04-12'
      lambda_values:
        description: 'Lambda per candidat, virgula'
        required: true
        default: '3.85,2.10'
      window_months:
        description: 'Luni per fereastra'
        required: true
        default: '3'
      mediacloud_query:
        description: 'Media Cloud queries | separate (optional)'
        required: false
        default: 'Peter Magyar OR Tisza Hungary|Orban Hungary'
      max_articles:
        description: 'Max articles Media Cloud per candidat'
        required: true
        default: '2000'
      bootstrap_n:
        description: 'Bootstrap iterations'
        required: true
        default: '100'

jobs:
  symbovolt-v3:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            mediacloud==4.6.0 \
            vaderSentiment==3.3.2 \
            scikit-learn==1.4.2 \
            sentence-transformers==2.7.0 \
            numpy==1.26.4 \
            scipy==1.13.0 \
            pytrends==4.9.2 \
            requests==2.31.0 \
            feedparser==6.0.11 \
            python-dateutil==2.9.0 \
            beautifulsoup4==4.12.3 \
            lxml==5.2.1

      # ══════════════════════════════════════
      # SURSA 1: Wikipedia Pageviews EN + HU
      # ══════════════════════════════════════
      - name: "Sursa 1 — Wikipedia Pageviews EN+HU"
        env:
          CANDIDATES:    ${{ github.event.inputs.candidates }}
          WIKI_PAGES:    ${{ github.event.inputs.wiki_pages }}
          WIKI_PAGES_HU: ${{ github.event.inputs.wiki_pages_hu }}
          START_DATE:    ${{ github.event.inputs.start_date }}
          END_DATE:      ${{ github.event.inputs.end_date }}
        run: |
          cat > /tmp/fetch_wiki.py << 'PYEOF'
          import requests, json, os, datetime, time

          candidates    = os.environ["CANDIDATES"].strip().split(",")
          wiki_pages_en = os.environ["WIKI_PAGES"].strip().split("|")
          wiki_pages_hu = os.environ["WIKI_PAGES_HU"].strip().split("|")
          start         = os.environ["START_DATE"].strip()
          end           = os.environ["END_DATE"].strip()

          start_str = datetime.datetime.strptime(start, "%Y-%m-%d").strftime("%Y%m%d")
          end_str   = datetime.datetime.strptime(end,   "%Y-%m-%d").strftime("%Y%m%d")

          os.makedirs("data", exist_ok=True)
          BASE    = "https://wikimedia.org/api/rest_v1/metrics/pageviews/per-article"
          HEADERS = {"User-Agent": "SYMBOVOLT/3.0 (research politomorphism)"}

          def fetch_wiki(lang, page):
              url = BASE + "/" + lang + ".wikipedia/all-access/all-agents/" + page.replace(" ","_") + "/daily/" + start_str + "/" + end_str
              for attempt in range(3):
                  try:
                      r = requests.get(url, headers=HEADERS, timeout=30)
                      if r.status_code == 200:
                          return r.json().get("items", [])
                      print("  HTTP " + str(r.status_code) + " for " + page + " (" + lang + ")")
                      return []
                  except Exception as e:
                      print("  Error: " + str(e))
                      time.sleep(5)
              return []

          for i, cand in enumerate(candidates):
              cand    = cand.strip()
              page_en = wiki_pages_en[i].strip() if i < len(wiki_pages_en) else cand
              page_hu = wiki_pages_hu[i].strip() if i < len(wiki_pages_hu) else cand

              print("Wikipedia EN: " + cand + " -> " + page_en)
              items_en = fetch_wiki("en", page_en)
              time.sleep(1)

              print("Wikipedia HU: " + cand + " -> " + page_hu)
              items_hu = fetch_wiki("hu", page_hu)
              time.sleep(1)

              combined = []
              en_dict  = {x["timestamp"][:8]: x.get("views",0) for x in items_en}
              hu_dict  = {x["timestamp"][:8]: x.get("views",0) for x in items_hu}
              all_dates = sorted(set(list(en_dict.keys()) + list(hu_dict.keys())))
              for d in all_dates:
                  combined.append({
                      "date":     d,
                      "views_en": en_dict.get(d, 0),
                      "views_hu": hu_dict.get(d, 0),
                      "views_total": en_dict.get(d, 0) + hu_dict.get(d, 0)
                  })

              print(cand + " Wikipedia total days: " + str(len(combined)))
              with open("data/" + cand + "-WIKI.json", "w") as f:
                  json.dump(combined, f)

          print("Wikipedia done.")
          PYEOF
          python3 /tmp/fetch_wiki.py

      # ══════════════════════════════════════
      # SURSA 2: Google Trends geo=HU
      # ══════════════════════════════════════
      - name: "Sursa 2 — Google Trends HU"
        env:
          CANDIDATES:       ${{ github.event.inputs.candidates }}
          TRENDS_KEYWORDS:  ${{ github.event.inputs.trends_keywords }}
          START_DATE:       ${{ github.event.inputs.start_date }}
          END_DATE:         ${{ github.event.inputs.end_date }}
        run: |
          cat > /tmp/fetch_trends.py << 'PYEOF'
          import json, os, time
          import numpy as np

          candidates = os.environ["CANDIDATES"].strip().split(",")
          keywords   = os.environ["TRENDS_KEYWORDS"].strip().split("|")
          start      = os.environ["START_DATE"].strip()
          end        = os.environ["END_DATE"].strip()

          os.makedirs("data", exist_ok=True)
          timeframe = start + " " + end

          def save_empty(cand):
              with open("data/" + cand.strip() + "-TRENDS.json", "w") as f:
                  json.dump({"keyword": "", "geo": "HU", "data": [], "status": "unavailable"}, f)

          try:
              from pytrends.request import TrendReq
              time.sleep(10)
              pytrends = TrendReq(hl="hu-HU", tz=60, timeout=(20,40), retries=3, backoff_factor=3)
              kw_list  = [k.strip() for k in keywords[:5]]
              print("Google Trends: " + str(kw_list) + " geo=HU timeframe=" + timeframe)
              time.sleep(8)
              pytrends.build_payload(kw_list, cat=0, timeframe=timeframe, geo="HU")
              time.sleep(8)
              df = pytrends.interest_over_time()

              if df is not None and not df.empty:
                  print("Trends rows: " + str(len(df)))
                  for i, cand in enumerate(candidates):
                      cand = cand.strip()
                      kw   = keywords[i].strip() if i < len(keywords) else kw_list[0]
                      if kw in df.columns:
                          series = [{"date": str(idx.date()), "value": int(row[kw])} for idx, row in df.iterrows()]
                          with open("data/" + cand + "-TRENDS.json", "w") as f:
                              json.dump({"keyword": kw, "geo": "HU", "data": series, "status": "ok"}, f)
                          print(cand + " trends: " + str(len(series)) + " pts")
                      else:
                          save_empty(cand)
              else:
                  print("Trends empty response")
                  for cand in candidates:
                      save_empty(cand)
          except Exception as e:
              print("Trends error: " + str(e))
              for cand in candidates:
                  save_empty(cand)

          print("Google Trends done.")
          PYEOF
          python3 /tmp/fetch_trends.py

      # ══════════════════════════════════════
      # SURSA 3: Reddit sentiment
      # ══════════════════════════════════════
      - name: "Sursa 3 — Reddit sentiment"
        env:
          CANDIDATES:     ${{ github.event.inputs.candidates }}
          REDDIT_QUERIES: ${{ github.event.inputs.reddit_queries }}
        run: |
          cat > /tmp/fetch_reddit.py << 'PYEOF'
          import requests, json, os, time
          from vaderSentiment.vaderSentiment import SentimentIntensityAnalyzer

          candidates     = os.environ["CANDIDATES"].strip().split(",")
          reddit_queries = os.environ["REDDIT_QUERIES"].strip().split("|")

          os.makedirs("data", exist_ok=True)
          analyzer   = SentimentIntensityAnalyzer()
          HEADERS    = {"User-Agent": "SYMBOVOLT/3.0 Research"}
          SUBREDDITS = ["hungary", "europe", "worldnews", "geopolitics", "europe"]

          for cand, query in zip(candidates, reddit_queries):
              cand  = cand.strip()
              query = query.strip()
              print("Reddit: " + cand + " | " + query)

              all_posts = []
              for sub in SUBREDDITS:
                  url    = "https://www.reddit.com/r/" + sub + "/search.json"
                  params = {"q": query, "sort": "new", "limit": 100, "t": "all"}
                  try:
                      r = requests.get(url, headers=HEADERS, params=params, timeout=20)
                      if r.status_code == 200:
                          posts = r.json().get("data", {}).get("children", [])
                          for p in posts:
                              pd  = p.get("data", {})
                              ttl = pd.get("title", "")
                              sc  = analyzer.polarity_scores(ttl)
                              all_posts.append({
                                  "title":    ttl,
                                  "sub":      sub,
                                  "score":    pd.get("score", 0),
                                  "created":  pd.get("created_utc", 0),
                                  "compound": sc["compound"]
                              })
                          print("  r/" + sub + ": " + str(len(posts)))
                  except Exception as e:
                      print("  r/" + sub + " error: " + str(e))
                  time.sleep(2)

              compounds = [p["compound"] for p in all_posts]
              summary   = {
                  "n_posts":       len(all_posts),
                  "mean_compound": round(sum(compounds)/len(compounds), 4) if compounds else 0.0,
                  "pos_ratio":     round(sum(1 for c in compounds if c > 0.05)/len(compounds), 4) if compounds else 0.0,
                  "neg_ratio":     round(sum(1 for c in compounds if c < -0.05)/len(compounds), 4) if compounds else 0.0,
                  "posts":         all_posts[:200]
              }
              with open("data/" + cand + "-REDDIT.json", "w") as f:
                  json.dump(summary, f)
              print(cand + " Reddit: " + str(len(all_posts)) + " posts")

          print("Reddit done.")
          PYEOF
          python3 /tmp/fetch_reddit.py

      # ══════════════════════════════════════
      # SURSA 4: RSS maghiar + englez
      # ══════════════════════════════════════
      - name: "Sursa 4 — RSS ziare HU+EN"
        env:
          CANDIDATES:   ${{ github.event.inputs.candidates }}
          RSS_FEEDS:    ${{ github.event.inputs.rss_feeds }}
          NEWS_RSS_EN:  ${{ github.event.inputs.news_rss_en }}
          START_DATE:   ${{ github.event.inputs.start_date }}
          END_DATE:     ${{ github.event.inputs.end_date }}
        run: |
          cat > /tmp/fetch_rss.py << 'PYEOF'
          import feedparser, json, os, time
          from vaderSentiment.vaderSentiment import SentimentIntensityAnalyzer

          candidates  = os.environ["CANDIDATES"].strip().split(",")
          rss_feeds   = os.environ["RSS_FEEDS"].strip().split("|")
          news_en     = os.environ["NEWS_RSS_EN"].strip().split("|")
          all_feeds   = rss_feeds + news_en

          os.makedirs("data", exist_ok=True)
          analyzer = SentimentIntensityAnalyzer()

          cand_keywords = {
              "Magyar":  ["Magyar", "Tisza", "Péter", "Peter Magyar", "tisza"],
              "Orban":   ["Orbán", "Orban", "Fidesz", "fidesz", "Viktor"],
          }

          all_articles = []
          for feed_url in all_feeds:
              feed_url = feed_url.strip()
              if not feed_url:
                  continue
              print("RSS: " + feed_url)
              try:
                  feed = feedparser.parse(feed_url)
                  for entry in feed.entries:
                      title   = entry.get("title", "")
                      summary = entry.get("summary", "")
                      link    = entry.get("link", "")
                      pub     = entry.get("published", "")
                      all_articles.append({
                          "title":   title,
                          "summary": summary[:300],
                          "url":     link,
                          "pub":     pub,
                          "source":  feed_url
                      })
                  print("  " + str(len(feed.entries)) + " articles")
              except Exception as e:
                  print("  RSS error: " + str(e))
              time.sleep(1)

          print("RSS total: " + str(len(all_articles)))

          for cand in candidates:
              cand     = cand.strip()
              keywords = cand_keywords.get(cand, [cand])

              filtered = []
              for art in all_articles:
                  text = art["title"] + " " + art["summary"]
                  if any(kw.lower() in text.lower() for kw in keywords):
                      sc  = analyzer.polarity_scores(art["title"])
                      art["compound"] = sc["compound"]
                      filtered.append(art)

              compounds = [a["compound"] for a in filtered if "compound" in a]
              summary_d = {
                  "n_articles":     len(filtered),
                  "mean_sentiment": round(sum(compounds)/len(compounds), 4) if compounds else 0.0,
                  "pos_ratio":      round(sum(1 for c in compounds if c > 0.05)/len(compounds), 4) if compounds else 0.0,
                  "articles":       filtered[:300]
              }
              with open("data/" + cand + "-RSS.json", "w") as f:
                  json.dump(summary_d, f)
              print(cand + " RSS filtered: " + str(len(filtered)))

          print("RSS done.")
          PYEOF
          python3 /tmp/fetch_rss.py

      # ══════════════════════════════════════
      # SURSA 5: Sondaje reale Wikipedia scrape
      # ══════════════════════════════════════
      - name: "Sursa 5 — Sondaje reale Wikipedia"
        run: |
          cat > /tmp/fetch_polls.py << 'PYEOF'
          import requests, json, os
          from bs4 import BeautifulSoup

          os.makedirs("data", exist_ok=True)

          URL     = "https://en.wikipedia.org/wiki/Opinion_polling_for_the_2026_Hungarian_parliamentary_election"
          HEADERS = {"User-Agent": "SYMBOVOLT/3.0 Research Bot"}

          print("Fetching Wikipedia polling page...")
          try:
              r = requests.get(URL, headers=HEADERS, timeout=30)
              soup = BeautifulSoup(r.text, "lxml")

              polls = []
              tables = soup.find_all("table", class_="wikitable")
              for table in tables:
                  rows = table.find_all("tr")
                  headers = []
                  for row in rows[:3]:
                      ths = row.find_all(["th"])
                      if ths:
                          headers = [th.get_text(strip=True) for th in ths]
                          break

                  # Cautam coloanele Tisza si Fidesz
                  tisza_col  = None
                  fidesz_col = None
                  for i, h in enumerate(headers):
                      hl = h.lower()
                      if "tisza" in hl or "magyar" in hl:
                          tisza_col = i
                      if "fidesz" in hl:
                          fidesz_col = i

                  if tisza_col is None or fidesz_col is None:
                      continue

                  for row in rows[1:]:
                      cells = row.find_all(["td", "th"])
                      if len(cells) < max(tisza_col, fidesz_col) + 1:
                          continue
                      try:
                          date_text   = cells[0].get_text(strip=True)
                          tisza_text  = cells[tisza_col].get_text(strip=True).replace("%","").replace("–","").strip()
                          fidesz_text = cells[fidesz_col].get_text(strip=True).replace("%","").replace("–","").strip()

                          if tisza_text and fidesz_text:
                              tisza_val  = float(tisza_text)
                              fidesz_val = float(fidesz_text)
                              polls.append({
                                  "date":    date_text,
                                  "tisza":   tisza_val,
                                  "fidesz":  fidesz_val,
                                  "lead":    round(tisza_val - fidesz_val, 1)
                              })
                      except Exception:
                          continue

              print("Polls scraped: " + str(len(polls)))

              # Calculeaza media sondajelor
              if polls:
                  avg_tisza  = round(sum(p["tisza"]  for p in polls) / len(polls), 2)
                  avg_fidesz = round(sum(p["fidesz"] for p in polls) / len(polls), 2)
                  avg_lead   = round(avg_tisza - avg_fidesz, 2)

                  # Ultimele 10 sondaje (cele mai recente)
                  recent = polls[:10]
                  recent_tisza  = round(sum(p["tisza"]  for p in recent) / len(recent), 2)
                  recent_fidesz = round(sum(p["fidesz"] for p in recent) / len(recent), 2)
                  recent_lead   = round(recent_tisza - recent_fidesz, 2)
              else:
                  avg_tisza = avg_fidesz = avg_lead = 0
                  recent_tisza = recent_fidesz = recent_lead = 0
                  recent = []

              result = {
                  "source":         URL,
                  "n_polls":        len(polls),
                  "avg_tisza":      avg_tisza,
                  "avg_fidesz":     avg_fidesz,
                  "avg_lead_tisza": avg_lead,
                  "recent_tisza":   recent_tisza,
                  "recent_fidesz":  recent_fidesz,
                  "recent_lead":    recent_lead,
                  "polls":          polls[:50]
              }

              with open("data/POLLS.json", "w") as f:
                  json.dump(result, f, indent=2)
              print("avg Tisza=" + str(avg_tisza) + " avg Fidesz=" + str(avg_fidesz) + " lead=" + str(avg_lead))
              print("recent Tisza=" + str(recent_tisza) + " recent Fidesz=" + str(recent_fidesz) + " lead=" + str(recent_lead))

          except Exception as e:
              print("Polls error: " + str(e))
              with open("data/POLLS.json", "w") as f:
                  json.dump({"n_polls": 0, "avg_tisza": 0, "avg_fidesz": 0, "avg_lead_tisza": 0,
                             "recent_tisza": 0, "recent_fidesz": 0, "recent_lead": 0, "polls": []}, f)

          print("Polls done.")
          PYEOF
          python3 /tmp/fetch_polls.py

      # ══════════════════════════════════════
      # SURSA 6: Eurostat inflatie + somaj
      # ══════════════════════════════════════
      - name: "Sursa 6 — Eurostat"
        env:
          EUROSTAT_COUNTRY: ${{ github.event.inputs.eurostat_country }}
          START_DATE:       ${{ github.event.inputs.start_date }}
          END_DATE:         ${{ github.event.inputs.end_date }}
        run: |
          cat > /tmp/fetch_eurostat.py << 'PYEOF'
          import requests, json, os

          country    = os.environ["EUROSTAT_COUNTRY"].strip()
          start_year = os.environ["START_DATE"].strip()[:4]
          end_year   = os.environ["END_DATE"].strip()[:4]

          os.makedirs("data", exist_ok=True)
          BASE    = "https://ec.europa.eu/eurostat/api/dissemination/statistics/1.0/data/"
          HEADERS = {"Accept": "application/json"}

          def fetch_eurostat(dataset, params):
              try:
                  r = requests.get(BASE + dataset, headers=HEADERS, params=params, timeout=30)
                  if r.status_code == 200:
                      data       = r.json()
                      values     = data.get("value", {})
                      time_lbls  = data.get("dimension",{}).get("time",{}).get("category",{}).get("label",{})
                      time_keys  = list(time_lbls.keys())
                      series = []
                      for idx_str, val in values.items():
                          idx = int(idx_str)
                          if idx < len(time_keys):
                              series.append({"period": time_keys[idx], "value": round(val,2) if val else None})
                      series.sort(key=lambda x: x["period"])
                      return series
              except Exception as e:
                  print("Eurostat error: " + str(e))
              return []

          inflation   = fetch_eurostat("prc_hicp_manr", {
              "geo": country, "unit": "RCH_A", "coicop": "CP00",
              "sinceTimePeriod": start_year+"-01", "untilTimePeriod": end_year+"-12", "format": "JSON"
          })
          unemployment = fetch_eurostat("une_rt_m", {
              "geo": country, "unit": "PC_ACT", "age": "TOTAL", "sex": "T", "s_adj": "SA",
              "sinceTimePeriod": start_year+"-01", "untilTimePeriod": end_year+"-12", "format": "JSON"
          })

          infl_vals    = [x["value"] for x in inflation   if x["value"] is not None]
          unempl_vals  = [x["value"] for x in unemployment if x["value"] is not None]

          crisis_index    = round(sum(infl_vals[-12:])/len(infl_vals[-12:]), 2)   if infl_vals    else 0.0
          unempl_recent   = round(sum(unempl_vals[-6:])/len(unempl_vals[-6:]),  2) if unempl_vals else 0.0
          unempl_trend    = round(unempl_vals[-1] - unempl_vals[-6], 2)            if len(unempl_vals) >= 6 else 0.0

          result = {
              "country":         country,
              "inflation":       inflation,
              "unemployment":    unemployment,
              "crisis_index":    crisis_index,
              "unempl_recent":   unempl_recent,
              "unempl_trend":    unempl_trend,
          }

          with open("data/EUROSTAT.json", "w") as f:
              json.dump(result, f, indent=2)
          print("crisis_index=" + str(crisis_index) + " unempl=" + str(unempl_recent) + " trend=" + str(unempl_trend))
          print("Eurostat done.")
          PYEOF
          python3 /tmp/fetch_eurostat.py

      # ══════════════════════════════════════
      # SURSA 7: Media Cloud (optional)
      # ══════════════════════════════════════
      - name: "Sursa 7 — Media Cloud (optional)"
        env:
          MC_API_KEY:  ${{ secrets.MEDIACLOUD_API_KEY }}
          CANDIDATES:  ${{ github.event.inputs.candidates }}
          QUERIES:     ${{ github.event.inputs.mediacloud_query }}
          START_DATE:  ${{ github.event.inputs.start_date }}
          END_DATE:    ${{ github.event.inputs.end_date }}
          MAX_ART:     ${{ github.event.inputs.max_articles }}
        run: |
          cat > /tmp/fetch_mc.py << 'PYEOF'
          import mediacloud.api as mc
          import json, os, datetime, csv, time

          candidates = os.environ["CANDIDATES"].strip().split(",")
          queries    = os.environ["QUERIES"].strip().split("|")
          start      = os.environ["START_DATE"].strip()
          end        = os.environ["END_DATE"].strip()
          max_art    = int(os.environ["MAX_ART"].strip())
          api_key    = os.environ["MC_API_KEY"].strip()

          search   = mc.SearchApi(api_key)
          start_dt = datetime.datetime.strptime(start, "%Y-%m-%d").date()
          end_dt   = datetime.datetime.strptime(end,   "%Y-%m-%d").date()

          os.makedirs("data", exist_ok=True)

          def make_serializable(obj):
              if isinstance(obj, dict):
                  return {k: make_serializable(v) for k, v in obj.items()}
              elif isinstance(obj, list):
                  return [make_serializable(i) for i in obj]
              elif isinstance(obj, (datetime.datetime, datetime.date)):
                  return obj.isoformat()
              return obj

          for cand, query in zip(candidates, queries):
              cand  = cand.strip()
              query = query.strip()
              print("MediaCloud: " + cand + " | " + query)

              stories = []
              page    = None
              for _ in range(10):
                  try:
                      result, page = search.story_list(
                          query, start_date=start_dt, end_date=end_dt,
                          pagination_token=page, collection_ids=[34412234],
                      )
                  except Exception as e:
                      print("  MC error: " + str(e))
                      time.sleep(5)
                      result, page = [], None
                  if not result:
                      break
                  stories.extend(result)
                  print("  " + cand + ": " + str(len(stories)))
                  if page is None or len(stories) >= max_art:
                      break

              stories = make_serializable(stories[:max_art])
              with open("data/" + cand + "-MC.json", "w") as f:
                  json.dump(stories, f)
              with open(cand + "-DATA.csv", "w", newline="", encoding="utf-8") as f:
                  w = csv.writer(f)
                  w.writerow(["title","publish_date","url"])
                  for s in stories:
                      w.writerow([s.get("title",""), s.get("publish_date",""), s.get("url","")])
              print(cand + " MC total: " + str(len(stories)))
              time.sleep(2)

          print("MediaCloud done.")
          PYEOF
          python3 /tmp/fetch_mc.py

      # ══════════════════════════════════════
      # COMPUTE: SRM pe ferestre (MC)
      # ══════════════════════════════════════
      - name: "Compute SRM per fereastra"
        env:
          CANDIDATES:    ${{ github.event.inputs.candidates }}
          LAMBDA_VALUES: ${{ github.event.inputs.lambda_values }}
          START_DATE:    ${{ github.event.inputs.start_date }}
          END_DATE:      ${{ github.event.inputs.end_date }}
          WINDOW_MONTHS: ${{ github.event.inputs.window_months }}
          BOOTSTRAP_N:   ${{ github.event.inputs.bootstrap_n }}
        run: |
          cat > /tmp/compute_srm.py << 'PYEOF'
          import json, os, math, random, datetime, subprocess
          import numpy as np
          from sklearn.decomposition import LatentDirichletAllocation
          from sklearn.feature_extraction.text import CountVectorizer
          from sentence_transformers import SentenceTransformer
          from sklearn.metrics.pairwise import cosine_similarity
          from scipy.spatial.distance import jensenshannon
          from vaderSentiment.vaderSentiment import SentimentIntensityAnalyzer
          from collections import defaultdict

          subprocess.run(["pip","install","python-dateutil","-q"])
          from dateutil.relativedelta import relativedelta

          candidates    = os.environ["CANDIDATES"].strip().split(",")
          lambda_values = [float(x) for x in os.environ["LAMBDA_VALUES"].strip().split(",")]
          start_date    = os.environ["START_DATE"].strip()
          end_date      = os.environ["END_DATE"].strip()
          window_months = int(os.environ["WINDOW_MONTHS"].strip())
          bootstrap_n   = int(os.environ["BOOTSTRAP_N"].strip())
          alpha_d       = 0.5

          model_emb = SentenceTransformer("paraphrase-multilingual-MiniLM-L12-v2")
          vader     = SentimentIntensityAnalyzer()

          def compute_D(texts, bn, alpha):
              if len(texts) < 5: return 0.5, 0.5, 0.5, 0.0
              vectorizer = CountVectorizer(max_df=0.95, min_df=1, max_features=2000, stop_words="english")
              try: X = vectorizer.fit_transform(texts)
              except: return 0.5, 0.5, 0.5, 0.0
              K = min(5, len(texts)//5)
              if K < 2: return 0.5, 0.5, 0.5, 0.0
              lda = LatentDirichletAllocation(n_components=K, random_state=42, max_iter=10)
              doc_topics = lda.fit_transform(X)
              pairs = [(i,j) for i in range(len(doc_topics)) for j in range(i+1,len(doc_topics))]
              sp = random.sample(pairs, min(500,len(pairs)))
              jsd = [v for i,j in sp for v in [jensenshannon(doc_topics[i],doc_topics[j])**2] if not (v!=v)]
              PE  = float(np.mean(jsd)) if jsd else 0.5
              samp = random.sample(texts, min(80,len(texts)))
              emb  = model_emb.encode(samp, show_progress_bar=False)
              sim  = cosine_similarity(emb)
              up   = sim[np.triu_indices(len(samp),k=1)]
              up   = up[~np.isnan(up)]
              ICI  = float(1-np.mean(up)) if len(up)>0 else 0.5
              D_boots = []
              for _ in range(bn):
                  si = random.choices(list(range(len(texts))),k=len(texts))
                  st = [texts[i] for i in si]
                  Xb = vectorizer.transform(st)
                  dt = lda.transform(Xb)
                  sp2 = random.sample(list(range(len(dt))),min(30,len(dt)))
                  jb  = []
                  for ii in range(len(sp2)):
                      for jj in range(ii+1,len(sp2)):
                          v = jensenshannon(dt[sp2[ii]],dt[sp2[jj]])**2
                          if not(v!=v): jb.append(v)
                          if len(jb)>=100: break
                      if len(jb)>=100: break
                  PE_b  = float(np.mean(jb)) if jb else PE
                  stb   = random.sample(st,min(40,len(st)))
                  eb    = model_emb.encode(stb,show_progress_bar=False)
                  sb    = cosine_similarity(eb)
                  ub    = sb[np.triu_indices(len(stb),k=1)]
                  ub    = ub[~np.isnan(ub)]
                  ICI_b = float(1-np.mean(ub)) if len(ub)>0 else ICI
                  Db    = alpha*PE_b+(1-alpha)*ICI_b
                  if not(Db!=Db): D_boots.append(Db)
              if not D_boots: D_boots=[alpha*PE+(1-alpha)*ICI]
              return PE,ICI,float(np.mean(D_boots)),float(np.std(D_boots))

          def compute_VAN(stories, ws, we):
              total_days = max((datetime.datetime.strptime(we,"%Y-%m-%d")-datetime.datetime.strptime(ws,"%Y-%m-%d")).days+1,1)
              dates_set  = set()
              daily      = defaultdict(int)
              for s in stories:
                  pv = str(s.get("publish_date",""))[:10]
                  if pv and len(pv)==10:
                      dates_set.add(pv); daily[pv]+=1
              N      = round(len(dates_set)/total_days,4)
              counts = [daily[d] for d in sorted(daily.keys())]
              if len(counts)>=10:
                  baseline = float(np.mean(counts[:max(1,len(counts)//3)]))
                  peak     = float(np.max(counts))
                  V = min(round(math.log((peak/baseline)+1)/math.log(51),4),1.0) if baseline>0 and peak>0 else 0.3
              else: V=0.3
              scores=[abs(vader.polarity_scores(s.get("title",""))["compound"]) for s in stories if len(s.get("title",""))>5]
              A = round(float(np.mean(scores)),4) if scores else 0.15
              return V,A,N

          start_dt_g = datetime.datetime.strptime(start_date,"%Y-%m-%d")
          end_dt_g   = datetime.datetime.strptime(end_date,  "%Y-%m-%d")
          windows=[]; cur=start_dt_g
          while cur<end_dt_g:
              w_end=min(cur+relativedelta(months=window_months),end_dt_g)
              windows.append((cur.strftime("%Y-%m-%d"),w_end.strftime("%Y-%m-%d")))
              cur=w_end

          all_results={}
          for ci,cand in enumerate(candidates):
              cand=cand.strip(); lam=lambda_values[ci] if ci<len(lambda_values) else 2.0
              try:
                  with open("data/"+cand+"-MC.json") as f: all_stories=json.load(f)
              except: all_stories=[]

              wdata=[]
              for ws,we in windows:
                  ws_dt=datetime.datetime.strptime(ws,"%Y-%m-%d")
                  we_dt=datetime.datetime.strptime(we,"%Y-%m-%d")
                  w_stories=[s for s in all_stories if len(str(s.get("publish_date",""))[:10])==10 and
                             ws_dt<=datetime.datetime.strptime(str(s.get("publish_date",""))[:10],"%Y-%m-%d")<we_dt]
                  texts=[t.strip() for t in [s.get("title","")+' '+s.get("description","") for s in w_stories] if len(t.strip())>15]
                  if len(texts)<5:
                      wdata.append({"window_start":ws,"window_end":we,"n_articles":len(w_stories),"SRM":None,"insufficient_data":True})
                      continue
                  PE,ICI,D,Dstd=compute_D(texts,bootstrap_n,alpha_d)
                  V,A,N=compute_VAN(w_stories,ws,we)
                  SRM=V*A*math.exp(-lam*D)*N
                  wdata.append({"window_start":ws,"window_end":we,"n_articles":len(w_stories),
                                "PE":round(PE,4),"ICI":round(ICI,4),"D":round(D,4),"D_std":round(Dstd,4),
                                "V":round(V,4),"A":round(A,4),"N":round(N,4),"SRM":round(SRM,8),"lambda":lam,
                                "insufficient_data":False})
                  print(cand+" "+ws+": SRM="+str(round(SRM,8)))

              all_results[cand]={"candidate":cand,"lambda":lam,"windows":wdata}

          with open("srm_windows.json","w") as f: json.dump(all_results,f,indent=2)
          print("Saved srm_windows.json")
          PYEOF
          python3 /tmp/compute_srm.py

      # ══════════════════════════════════════
      # COMPUTE: SYMBOVOLT v3.0 VES final
      # ══════════════════════════════════════
      - name: "Compute SYMBOVOLT v3.0 — VES final"
        env:
          CANDIDATES: ${{ github.event.inputs.candidates }}
        run: |
          cat > /tmp/compute_ves_v3.py << 'PYEOF'
          import json, os, math
          import numpy as np

          candidates = [c.strip() for c in os.environ["CANDIDATES"].strip().split(",")]

          # ── Load tuturor surselor ──
          with open("srm_windows.json") as f: srm_data=json.load(f)

          def load(path, default):
              try:
                  with open(path) as f: return json.load(f)
              except: return default

          eurostat = load("data/EUROSTAT.json", {"crisis_index":0,"unempl_trend":0})
          polls    = load("data/POLLS.json",    {"n_polls":0,"recent_tisza":0,"recent_fidesz":0,"recent_lead":0,"avg_lead_tisza":0})

          crisis_index  = eurostat.get("crisis_index",  0.0)
          unempl_trend  = eurostat.get("unempl_trend",  0.0)
          poll_lead     = {"Magyar": polls.get("recent_lead",0), "Orban": -polls.get("recent_lead",0)}
          n_polls       = polls.get("n_polls", 0)

          print("Crisis index: "+str(crisis_index))
          print("Polls n="+str(n_polls)+" Magyar lead="+str(polls.get("recent_lead",0)))

          def srm_series(cand):
              return [{"window":w["window_start"],"SRM":w["SRM"]}
                      for w in srm_data.get(cand,{}).get("windows",[])
                      if not w.get("insufficient_data") and w.get("SRM") is not None]

          def momentum(series):
              if len(series)<2: return 0.0
              y=np.array([s["SRM"] for s in series]); x=np.arange(len(y))
              return float(np.polyfit(x,y,1)[0])

          def wiki_trend(cand):
              items=load("data/"+cand+"-WIKI.json",[])
              if len(items)<2: return 1.0
              views=[x.get("views_total",0) for x in items]
              mid=len(views)//2
              early=np.mean(views[:mid]) if mid>0 else 1
              late =np.mean(views[mid:]) if len(views[mid:])>0 else 1
              return float(min(late/max(early,1),10.0))

          def trends_momentum(cand):
              td=load("data/"+cand+"-TRENDS.json",{"data":[]})
              data=td.get("data",[])
              if len(data)<4: return 0.0
              vals=[x["value"] for x in data]
              mid=len(vals)//2
              early=np.mean(vals[:mid]) if mid>0 else 1
              late =np.mean(vals[mid:]) if len(vals[mid:])>0 else 1
              return float((late-early)/max(early,1))

          def reddit_score(cand):
              rd=load("data/"+cand+"-REDDIT.json",{"mean_compound":0,"pos_ratio":0,"n_posts":0})
              return round((rd.get("mean_compound",0)+rd.get("pos_ratio",0))/2,4)

          def rss_score(cand):
              rd=load("data/"+cand+"-RSS.json",{"mean_sentiment":0,"n_articles":0})
              return round(rd.get("mean_sentiment",0),4)

          # ── PONDERE SURSE v3.0 ──
          # Sondaje reale primesc cea mai mare greutate
          W = {
              "polls":     0.35,   # sondaje reale Wikipedia
              "srm":       0.20,   # Media Cloud SRM
              "wiki":      0.15,   # Wikipedia pageviews
              "trends":    0.12,   # Google Trends
              "reddit":    0.08,   # Reddit sentiment
              "rss":       0.06,   # RSS local
              "eurostat":  0.04,   # Eurostat
          }

          ves_scores={}; details={}

          for cand in candidates:
              series    = srm_series(cand)
              srm_last  = series[-1]["SRM"] if series else 0.0
              mom       = momentum(series)
              mom_norm  = 1/(1+math.exp(-mom*1000))
              trend_b   = max(0,(series[-1]["SRM"]-series[0]["SRM"])*10) if len(series)>=2 else 0
              srm_comp  = srm_last*(1+mom_norm)*(1+trend_b)

              wiki      = wiki_trend(cand)
              trends    = trends_momentum(cand)
              reddit    = reddit_score(cand)
              rss       = rss_score(cand)

              # Sondaje: normalizare lead la [0,1]
              lead      = poll_lead.get(cand, 0.0)
              poll_comp = max(0, (lead + 20) / 40)  # lead -20..+20 -> 0..1

              # Eurostat: crisis avantajeaza opozitia
              is_opp    = (cand == "Magyar")
              crisis_b  = crisis_index*0.01 if is_opp else -crisis_index*0.005
              unempl_b  = unempl_trend*0.01 if is_opp else -unempl_trend*0.005

              VES = (
                  W["polls"]    * poll_comp +
                  W["srm"]      * srm_comp +
                  W["wiki"]     * min(wiki/5.0, 1.0) +
                  W["trends"]   * max(0, trends+0.5) +
                  W["reddit"]   * max(0, reddit+0.5) +
                  W["rss"]      * max(0, rss+0.5) +
                  W["eurostat"] * max(0, crisis_index*0.01)
              ) * (1 + crisis_b + unempl_b)

              ves_scores[cand] = max(VES, 0.0001)
              details[cand]    = {
                  "srm_last":     round(srm_last,8),
                  "srm_momentum": round(mom,8),
                  "srm_comp":     round(srm_comp,8),
                  "wiki_trend":   round(wiki,4),
                  "trends_mom":   round(trends,4),
                  "reddit":       round(reddit,4),
                  "rss":          round(rss,4),
                  "poll_lead":    round(lead,2),
                  "poll_comp":    round(poll_comp,4),
                  "crisis_index": round(crisis_index,4),
                  "crisis_bonus": round(crisis_b,4),
                  "VES":          round(VES,8),
              }

          # Softmax
          vals   = np.array([ves_scores[c] for c in candidates])
          scaled = vals*1000
          exp    = np.exp(scaled-np.max(scaled))
          probs  = exp/exp.sum()

          print("")
          print("="*60)
          print("SYMBOVOLT v3.0 — Full Web Intelligence")
          print("="*60)

          results={}
          for i,cand in enumerate(candidates):
              p=float(probs[i]); v=ves_scores.get(cand,0); d=details.get(cand,{})
              results[cand]={
                  "VES":       round(v,8),
                  "P_win":     round(p,4),
                  "P_win_pct": round(p*100,2),
                  "components": {k:d.get(k,0) for k in ["srm_last","srm_momentum","wiki_trend","trends_mom",
                                                          "reddit","rss","poll_lead","poll_comp",
                                                          "crisis_index","crisis_bonus"]},
                  "srm_windows": [{"window":w["window"],"SRM":w["SRM"]} for w in srm_series(srm_data.get(cand,{}))]
              }
              print(cand+": VES="+str(round(v,8))+" P_win="+str(round(p*100,2))+"%")
              print("  polls_lead="+str(d.get("poll_lead",0))+" wiki="+str(d.get("wiki_trend",0))+" trends="+str(d.get("trends_mom",0)))

          winner=max(results,key=lambda c:results[c]["P_win"])
          print("")
          print("PREDICTED WINNER: "+winner+" ("+str(results[winner]["P_win_pct"])+"%)")
          print("="*60)

          output={
              "model":   "SYMBOVOLT v3.0",
              "framework": "Politomorphism Engine",
              "sources": ["WikipediaPageviews_EN","WikipediaPageviews_HU","GoogleTrends_HU",
                          "Reddit","RSS_HU","RSS_EN","Eurostat","MediaCloud","WikipediaPolls"],
              "weights": W,
              "poll_data": {"n_polls":n_polls, "recent_Magyar":polls.get("recent_tisza",0),
                            "recent_Orban":polls.get("recent_fidesz",0), "lead_Magyar":polls.get("recent_lead",0)},
              "candidates":       results,
              "predicted_winner": winner,
              "predicted_winner_pwin": results[winner]["P_win_pct"],
              "crisis_index":     crisis_index,
              "disclaimer":       "SYMBOVOLT v3.0 — rezonanta simbolica multi-sursa + sondaje reale. Nu inlocuieste rezultatele oficiale."
          }

          with open("symbovolt_v3_results.json","w") as f: json.dump(output,f,indent=2)
          print("Saved symbovolt_v3_results.json")
          PYEOF
          python3 /tmp/compute_ves_v3.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SYMBOVOLT-v3-${{ github.run_number }}
          retention-days: 90
          path: |
            symbovolt_v3_results.json
            srm_windows.json
            data/POLLS.json
            data/EUROSTAT.json
            Magyar-DATA.csv
            Orban-DATA.csv

      - name: Commit results to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase false
          git stash --include-untracked || true
          git pull origin main || true
          git stash pop || true
          git add symbovolt_v3_results.json srm_windows.json data/POLLS.json data/EUROSTAT.json || true
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "SYMBOVOLT v3.0 results [Run #${{ github.run_number }}]"
          git push origin main

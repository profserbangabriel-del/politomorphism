name: SRM — LLM Coding

on:
  workflow_dispatch:

jobs:
  llm-coding:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas

      - name: Run LLM coding
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/llm_coding.py \
            --input trump_validation_sample.csv \
            --output llm_coded.csv

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: llm-coded-results
          path: llm_coded.csv
          retention-days: 90

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add llm_coded.csv || true
          git diff --staged --quiet || git commit -m "LLM coding: 300 articles coded"
          git push

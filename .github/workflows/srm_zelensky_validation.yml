name: SRM Zelensky Validation

on:
  # Run manually from the Actions tab
  workflow_dispatch:
    inputs:
      A_value:
        description: 'Affective Weight A (VADER result, 0–1)'
        required: true
        default: '0.640'
      D_value:
        description: 'Semantic Drift D (expert estimate, 0–1)'
        required: true
        default: '0.680'

  # Or trigger automatically when you push new CSV data
  push:
    paths:
      - 'data/counts_zelensky_*.csv'

jobs:
  validate_srm:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ───────────────────────────────
      - name: Install dependencies
        run: |
          pip install vaderSentiment requests matplotlib numpy

      # ── 4. Run VADER sentiment (optional — skip if A is set manually) ──
      # Uncomment the next block if you have Media Cloud API key in secrets:
      #
      # - name: Compute A via VADER
      #   env:
      #     MEDIACLOUD_API_KEY: ${{ secrets.MEDIACLOUD_API_KEY }}
      #   run: |
      #     python vader_sentiment.py \
      #       --api-key "$MEDIACLOUD_API_KEY" \
      #       --query "zelensky" \
      #       --start "2022-05-20" \
      #       --end "2026-02-23" \
      #       --output A_result.json
      #     A=$(python -c "import json; print(json.load(open('A_result.json'))['A_affective_weight'])")
      #     echo "SRM_A=$A" >> $GITHUB_ENV

      # ── 5. Run SRM validation ─────────────────────────────────
      - name: Run SRM Zelensky Validation
        env:
          SRM_A: ${{ github.event.inputs.A_value || '0.640' }}
          SRM_D: ${{ github.event.inputs.D_value || '0.680' }}
        run: |
          python srm_zelensky_validation.py

      # ── 6. Generate chart ─────────────────────────────────────
      - name: Generate SRM chart
        env:
          SRM_A: ${{ github.event.inputs.A_value || '0.640' }}
          SRM_D: ${{ github.event.inputs.D_value || '0.680' }}
        run: |
          python generate_chart.py

      # ── 7. Upload artifacts ───────────────────────────────────
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: srm-zelensky-results
          path: |
            SRM_zelensky_result.json
            SRM_zelensky_chart.png
            SRM_zelensky_temporal.png

      # ── 8. Commit results back to repo ───────────────────────
      - name: Commit results to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SRM_zelensky_result.json SRM_zelensky_chart.png SRM_zelensky_temporal.png || true
          git diff --staged --quiet || git commit -m "SRM Zelensky validation run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || echo "Nothing to push"

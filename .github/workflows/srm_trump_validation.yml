name: SRM Validation Pipeline - Trump

on:
  workflow_dispatch:
  push:
    paths:
      - 'srm_trump_engine.py'
      - 'TRUMP+DATA.csv'

jobs:
  run-srm-trump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy matplotlib

      - name: Run SRM Trump validation
        run: |
          python srm_trump_engine.py

      - name: Commit results
        run: |
          git config --global user.name "profserbangabriel-del"
          git config --global user.email "actions@github.com"
          git add SRM_trump_result.json SRM_trump_grafic.png SRM_trump_temporal.png || true
          git diff --cached --quiet || git commit -m "Auto: SRM Trump validation results"
          git push || true

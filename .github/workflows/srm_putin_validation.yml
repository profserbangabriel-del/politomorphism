name: SRM Validation Pipeline - Putin

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Symbol to analyze'
        required: true
        default: 'Vladimir Putin'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  srm_pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install vaderSentiment pandas numpy matplotlib scipy

      - name: STEP 2 - Sentiment A
        run: python srm_pipeline/pas2_A_sentiment.py "${{ github.event.inputs.symbol }}"

      - name: STEP 3 - Semantic Drift D
        run: python srm_pipeline/pas3_D_semantic_drift.py "${{ github.event.inputs.symbol }}"
        continue-on-error: true

      - name: STEP 4 - Network Coverage N
        run: python srm_pipeline/pas4_N_gdelt.py "${{ github.event.inputs.symbol }}"
        continue-on-error: true

      - name: STEP 5 - Final SRM Score
        run: python srm_pipeline/pas5_SRM_final.py "${{ github.event.inputs.symbol }}"

      - name: Save results
        uses: actions/upload-artifact@v4
        with:
          name: srm-results-putin
          path: rezultate/

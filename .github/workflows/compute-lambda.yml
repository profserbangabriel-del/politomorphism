name: Compute Lambda for Charlie Hebdo

on:
  push:
    paths:
      - 'chariel hebdo counts.csv'
      - 'compute_lambda.py'
  workflow_dispatch:

jobs:
  compute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas scipy

      - name: Run script
        run: python compute_lambda.py > lambda_result.txt

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: lambda-result
          path: lambda_result.txt
